<div class="app-container">

  <!-- =========================
       HEADER
  ========================== -->

  <header class="app-header">

```
<div class="brand">

  <img
  src="UNF HIAC Logo & Announcement - 3 (1).png"
  alt="HIAC Logo"
  class="logo-img"
  >

  <div>

    <h1>
      HIAC Dashboard
    </h1>

    <p class="subtitle">
      Health Informatics & Analytics Club
    </p>

  </div>

</div>

<div class="header-actions">

  <button>
    + Task
  </button>

  <button>
    + Meeting
  </button>

  <button>
    Export
  </button>

  <button>
    Refresh
  </button>

</div>
```

  </header>

  <!-- =========================
       KPI SUMMARY
  ========================== -->

  <section class="summary-grid">

```
<div class="summary-card">

  <span>Total Tasks</span>

  <strong id="totalTasks">
    0
  </strong>

</div>

<div class="summary-card">

  <span>Completed</span>

  <strong id="completedTasks">
    0
  </strong>

</div>

<div class="summary-card">

  <span>Events</span>

  <strong id="eventCount">
    0
  </strong>

</div>

<div class="summary-card">

  <span>Attendance</span>

  <strong id="attendanceRate">
    0%
  </strong>

</div>
```

  </section>

  <!-- =========================
       MOBILE DASHBOARD
  ========================== -->

  <div id="mobileDashboard">

```
<section id="mobileOfficer"></section>

<section id="mobileAttendance"></section>

<section id="mobileTasks"></section>

<section id="mobileEvents"></section>

<section id="mobileMarketing"></section>

<section id="mobileBudget"></section>
```

  </div>

  <!-- =========================
       DESKTOP DASHBOARD
  ========================== -->

  <div id="desktopDashboard">
