<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HIAC Cord Eligibility Tracker</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

:root{
--navy:#06122a;
--lime:#dfff00;
--green:#16a34a;
--red:#dc2626;
}

body{
margin:0;
padding:20px;
background:#06122a;
font-family:Segoe UI,Arial,sans-serif;
}

.header{
background:#111827;
color:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.panel{
background:white;
border-radius:20px;
padding:20px;
margin-bottom:20px;
overflow-x:auto;
}

button{
background:var(--lime);
border:none;
padding:12px 16px;
font-weight:800;
border-radius:12px;
cursor:pointer;
}

.kpis{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:20px;
}

.kpi{
background:#f8fafc;
border-radius:16px;
padding:16px;
text-align:center;
}

.kpi strong{
font-size:28px;
display:block;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#111827;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #e5e7eb;
}

input{
width:100%;
padding:8px;
}

.badge{
padding:6px 10px;
border-radius:999px;
font-size:12px;
font-weight:800;
}

.eligible{
background:#dcfce7;
color:#166534;
}

.risk{
background:#fee2e2;
color:#991b1b;
}

@media(max-width:768px){

.kpis{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="header">

<h1>🎓 HIAC Cord Eligibility Tracker</h1>

<p>
Tracks active members and graduation cord eligibility.
</p>

</div>

<div class="panel">

<h2>Import CampusGroups CSV</h2>

<input
type="file"
accept=".csv"
onchange="importMembers(event)"
>

</div>

<div class="panel">

<div class="kpis">

<div class="kpi">
<strong id="activeCount">0</strong>
Active
</div>

<div class="kpi">
<strong id="eligibleCount">0</strong>
Eligible
</div>

<div class="kpi">
<strong id="riskCount">0</strong>
At Risk
</div>

<div class="kpi">
<strong id="graduateCount">0</strong>
Graduated
</div>

</div>

</div>

<div class="panel">

<h2>Active Members</h2>

<table>

<thead>

<tr>
<th>Name</th>
<th>Email</th>
<th>Attended</th>
<th>Eligible Events</th>
<th>%</th>
<th>Status</th>
</tr>

</thead>

<tbody id="memberTable">
</tbody>

</table>

</div>

<div class="panel">

<h2>Graduated Archive</h2>

<table>

<thead>

<tr>
<th>Name</th>
<th>Email</th>
</tr>

</thead>

<tbody id="graduateTable">
</tbody>

</table>

</div>
